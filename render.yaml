services:
  - type: web
    name: caronas-site
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn caronas_site.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: caronas_site.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: caronas-db
          property: connectionString

databases:
  - name: caronas-db
    plan: free
