{% extends "base.html" %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="card shadow-lg p-4" style="width: 100%; max-width: 460px;">
        <h3 class="text-center mb-3">Recuperar senha</h3>
        <p class="text-muted small text-center mb-4">
            Informe seu e-mail para receber um link temporário de redefinição.
        </p>

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label" for="{{ form.email.id_for_label }}">Email</label>
                {{ form.email }}
                {% if form.email.errors %}
                    <div class="text-danger small mt-1">{{ form.email.errors|join:", " }}</div>
                {% endif %}
            </div>
            <button type="submit" class="btn btn-primary w-100">Enviar link</button>
        </form>
    </div>
</div>
{% endblock %}
