{% extends "base.html" %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="card card-soft shadow-lg p-4" style="width: 100%; max-width: 520px;">
        <h3 class="text-center mb-2">Finalizar cadastro</h3>
        <p class="text-muted text-center mb-4">
            Confirme seus dados para concluir o acesso.
        </p>

        <form method="post" class="vstack gap-3">
            {% csrf_token %}
            {% for field in form %}
                <div>
                    <label class="form-label">{{ field.label }}</label>
                    {{ field.as_widget(attrs={'class': 'form-control'}) }}
                    {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary w-100">
                Concluir
            </button>
        </form>

        <a href="{% url 'login' %}" class="btn btn-outline-secondary w-100 mt-2">
            Voltar
        </a>
    </div>
</div>
{% endblock %}
