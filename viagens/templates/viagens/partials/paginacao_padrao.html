{% if page_obj and page_obj.paginator.num_pages > 1 %}
<nav aria-label="Paginação" class="mt-3">
    <div class="d-flex justify-content-center">
        <div class="d-inline-flex align-items-center gap-2 p-2 rounded-3 border border-primary-subtle bg-primary-subtle">
            {% if page_obj.has_previous %}
                <a class="btn btn-sm btn-outline-primary" href="?{{ querystring }}&page={{ page_obj.previous_page_number }}">
                    <i class="bi bi-chevron-left"></i> Anterior
                </a>
            {% else %}
                <button class="btn btn-sm btn-outline-primary" disabled>
                    <i class="bi bi-chevron-left"></i> Anterior
                </button>
            {% endif %}

            <span class="small text-primary fw-semibold px-2">
                Página {{ page_obj.number }} de {{ page_obj.paginator.num_pages }}
            </span>

            {% if page_obj.has_next %}
                <a class="btn btn-sm btn-outline-primary" href="?{{ querystring }}&page={{ page_obj.next_page_number }}">
                    Próxima <i class="bi bi-chevron-right"></i>
                </a>
            {% else %}
                <button class="btn btn-sm btn-outline-primary" disabled>
                    Próxima <i class="bi bi-chevron-right"></i>
                </button>
            {% endif %}
        </div>
    </div>
</nav>
{% endif %}
