{% extends "base.html" %}
{% load static %}

{% block body_data %}
data-page="encomendas-carona-local" data-carona-id="{{ carona_id }}"
{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <h2 class="mb-0">Minhas Encomendas da Viagem</h2>
        <a href="{% url 'minhas_encomendas_passageiro' %}" class="btn btn-outline-secondary" onclick="if(document.referrer){history.back();return false;}">
            <i class="bi bi-arrow-left"></i> Voltar
        </a>
    </div>

    <div id="encomenda-carona-local"></div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/encomendas.js' %}"></script>
{% endblock %}
