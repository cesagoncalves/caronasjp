{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Solicitacao enviada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .cta-title { font-size: 1.45rem; }
        .cta-text { font-size: 1.02rem; }
        .cta-card { width: 100%; max-width: 520px; }
        @media (max-width: 575.98px) {
            .cta-title { font-size: 2rem; }
            .cta-text { font-size: 1.2rem; }
            .cta-card {
                max-width: none;
                min-height: 72dvh;
                border-radius: 18px;
                padding: 1.25rem !important;
            }
            .cta-card .btn {
                padding-top: 0.95rem;
                padding-bottom: 0.95rem;
                font-size: 1.12rem;
            }
        }
    </style>
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center py-3 px-2" style="min-height: 100dvh;">
    <div class="card shadow-lg p-4 p-sm-4 p-3 cta-card">
        <h4 class="text-center mb-2 cta-title">Crie uma conta para receber notificacoes</h4>
        <p class="text-muted text-center mb-4 cta-text">
            Usuários sem uma conta nao recebem notificações, recarregue a página com frequência ou crie uma conta agora.
        </p>
        <div class="d-grid gap-2">
            <a href="{% url 'signup' %}" class="btn btn-primary">
                Criar conta
            </a>
            <button type="button" class="btn btn-outline-secondary" id="btnSemConta">
                Não, valeu
            </button>
        </div>
        <div class="text-muted small mt-3 text-center" id="statusRedirecionando"></div>
    </div>
</div>

<script>
    const agora = new Date().toISOString();

    const solicitacao = {
        id: {{ solicitacao.id }},
        token_cancelamento: "{{ solicitacao.token_cancelamento }}",

        carona_id: {{ carona.id }},
        carona_destino: "{{ carona.destino|escapejs }}",
        carona_origem: "{{ carona.origem|escapejs }}",
        carona_data: "{{ carona.data|date:'Y-m-d' }}",
        carona_hora: "{{ carona.hora|time:'H:i' }}",

        motorista_nome: "{{ carona.motorista.nome_curto|default:carona.motorista.nome_completo|escapejs }}",

        quantidade: {{ quantidade }},
        tipo: "{{ solicitacao.tipo|default:'carona' }}",
        endereco_solicitante: "{{ solicitacao.endereco_solicitante|default:''|escapejs }}",
        endereco_destino_solicitante: "{{ solicitacao.endereco_destino_solicitante|default:''|escapejs }}",
        descricao_item: "{{ solicitacao.descricao_item|default:''|escapejs }}",

        status: "{{ status }}",
        carona_status: "{{ carona.status }}",

        data_solicitacao: "{{ solicitacao.data_solicitacao|date:'Y-m-d H:i' }}",

        visto_solicitacao: true,
        visto_viagem: true,
        viagem_atualizada: false,
        ultima_edicao_lida: agora,
    };

    const STORAGE_KEY = "solicitacoes_passageiro";
    const lista = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    const jaExiste = lista.some(s => Number(s.id) === Number(solicitacao.id));
    if (!jaExiste) {
        lista.push(solicitacao);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(lista));
    }

    const destino = solicitacao.tipo === "encomenda"
        ? "{% url 'minhas_encomendas_passageiro' %}"
        : "{% url 'minhas_solicitacoes' %}";

    const btnSemConta = document.getElementById("btnSemConta");
    const statusRedirecionando = document.getElementById("statusRedirecionando");

    btnSemConta.addEventListener("click", () => {
        statusRedirecionando.textContent = "Redirecionando...";
        window.location.href = destino;
    });
</script>

</body>
</html>
